# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
      - name: Install dependencies
        run: flutter pub get
      - run: flutter build web --release \ --dart-define=TELEGRAM_BOT_TOKEN=${{
          secrets.TELEGRAM_BOT_TOKEN }} \ --dart-define=TELEGRAM_CHAT_ID=${{
          secrets.TELEGRAM_CHAT_ID }} \ --dart-define=SERVICE_ID=${{
          secrets.SERVICE_ID }} \ --dart-define=CONTACT_US_TEMPLATE_ID=${{
          secrets.CONTACT_US_TEMPLATE_ID }} \
          --dart-define=AUTO_REPLY_TEMPLATE_ID=${{
          secrets.AUTO_REPLY_TEMPLATE_ID }} \ --dart-define=PUBLIC_KEY=${{
          secrets.PUBLIC_KEY }} \ --dart-define=PRIVATE_KEY=${{
          secrets.PRIVATE_KEY }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HAMZA_SAYS_PORTFOLIO }}
          channelId: live
          projectId: hamza-says-portfolio
